<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MUST Resource Portal</title>
  <link rel="stylesheet" href="./shared/css/theme.css">
  <style>
    body{min-height:100vh;background:linear-gradient(180deg,#f0f9ff,#fff);font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;margin:0;color:#172033}
    .wrap{max-width:1000px;margin:0 auto;padding:48px 20px}
    .hero{background:white;border:1px solid #dbeafe;border-radius:28px;padding:36px;box-shadow:0 20px 60px rgba(56,189,248,.14)}
    h1{font-size:38px;margin:0 0 12px}
    p{line-height:1.8;color:#516070}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px}
    .card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #dbeafe;border-radius:22px;padding:22px;box-shadow:0 12px 36px rgba(15,39,66,.08)}
    .card:hover{transform:translateY(-2px)}
    .icon{font-size:34px}
    .title{font-size:22px;font-weight:800;margin:10px 0}
    .muted{font-size:14px;color:#6b7280}
    .disabled{opacity:.55}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>MUST Resource Portal</h1>
      <p>資源教室行政工具入口。之後公告、活動、表單與其他行政系統都可以集中在這裡，不用存一堆我的最愛。</p>
      <div class="cards">
        <a class="card" href="./frontend/">
          <div class="icon">🎉</div>
          <div class="title">活動報名與回饋系統</div>
          <div class="muted">活動列表、報名、回饋、成果報表</div>
        </a>
        <a class="card" href="./admin/">
          <div class="icon">🛠️</div>
          <div class="title">活動系統後台</div>
          <div class="muted">老師登入後管理活動、查詢學生參與紀錄</div>
        </a>
        <div class="card disabled">
          <div class="icon">📋</div>
          <div class="title">其他表單系統</div>
          <div class="muted">未來可加入 ISP、合理調整、借用或其他行政表單</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
