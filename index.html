<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>資源教室活動報名與回饋系統 V1</title>
  <style>
    :root{--primary:#1f5fbf;--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--border:#d9dee8;--danger:#b42318;--ok:#067647;--warn:#b54708;}
    *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,var(--primary),#0b2f6a);color:white;padding:22px 18px} header .wrap{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    h1{font-size:24px;margin:0} .subtitle{opacity:.9;margin-top:4px;font-size:14px}.wrap{max-width:1100px;margin:22px auto;padding:0 16px}.tabs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}.tab{border:1px solid var(--border);background:white;border-radius:999px;padding:9px 15px;cursor:pointer}.tab.active{background:var(--primary);color:white;border-color:var(--primary)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(16,24,40,.04)}
    .card h2{margin:0 0 14px;font-size:20px}.card h3{margin:14px 0 10px;font-size:16px}.row{display:grid;grid-template-columns:150px 1fr;gap:10px;align-items:center;margin:10px 0}.row label{font-weight:700}.row input,.row textarea,.row select{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:9px;font:inherit}.row textarea{min-height:86px;resize:vertical}.help{color:var(--muted);font-size:13px;line-height:1.5}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:0;background:var(--primary);color:white;padding:10px 13px;border-radius:10px;cursor:pointer;font-weight:700}.btn.secondary{background:#eef4ff;color:#1849a9}.btn.danger{background:#fee4e2;color:var(--danger)}.btn.gray{background:#f2f4f7;color:#344054}.btn.small{padding:7px 9px;font-size:13px}.pill{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:700}.pill.open{background:#dcfae6;color:var(--ok)}.pill.closed{background:#fef0c7;color:var(--warn)}.pill.end{background:#fee4e2;color:var(--danger)}
    table{width:100%;border-collapse:collapse;margin-top:10px;background:white}th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc}.activity{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;border:1px solid var(--border);border-radius:12px;padding:14px;margin:10px 0;background:white}.activity-title{font-weight:800;font-size:17px}.muted{color:var(--muted)}.question{border:1px dashed var(--border);border-radius:10px;padding:12px;margin:10px 0;background:#fafafa}.required{color:#d92d20}.public-page{min-height:100vh;padding:28px 14px}.form-shell{max-width:760px;margin:auto}.hero{border-radius:16px;padding:26px 22px;margin-bottom:14px;background:#fff3e0;border:1px solid rgba(0,0,0,.08);text-align:center}.hero h1{font-size:38px;color:#102a43}.field{background:white;border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0}.field label{font-weight:800;display:block;margin-bottom:8px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);border-radius:9px;padding:11px;font:inherit}.field textarea{min-height:120px}.options label{font-weight:400;margin:8px 0}.notice{text-align:center;background:white;border:1px solid var(--border);border-radius:16px;padding:38px 20px}.notice h2{font-size:28px}.success{background:#ecfdf3;border-color:#abefc6}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.modal-box{background:white;border-radius:16px;padding:22px;max-width:420px;width:100%;text-align:center}.modal img{max-width:260px;width:100%;height:auto}.stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.stat div{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:12px}.stat b{font-size:22px}.top-note{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px;margin-bottom:14px}.hidden{display:none!important}
    @media(max-width:800px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.activity{display:block}.hero h1{font-size:30px}.stat{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="app"></div>
<div class="modal" id="qrModal"><div class="modal-box"><h2 id="qrTitle">QR Code</h2><p class="help" id="qrLink"></p><img id="qrImg" alt="QR Code"><div class="btns" style="justify-content:center"><button class="btn gray" onclick="closeQR()">關閉</button><a class="btn secondary" id="qrDownload" target="_blank" download="qrcode.png">開啟/下載圖片</a></div></div></div>
<script>
const LS='resourceActivityV1';
const defaultFields=[
 {id:'name',label:'姓名',type:'short',required:true,fixed:true},
 {id:'dept',label:'系級（如：旅廚一甲）',type:'short',required:true,fixed:true},
 {id:'studentId',label:'學號',type:'short',required:true,fixed:true},
 {id:'phone',label:'電話號碼（如：0912-345678）',type:'short',required:true,fixed:true},
 {id:'meal',label:'餐點',type:'radio',required:true,options:['葷','素','不用餐'],fixed:true}
];
const defaultFeedback=[
 {id:'satisfaction',label:'本次活動整體滿意度',type:'scale',required:true,options:['非常滿意','滿意','普通','不滿意','非常不滿意'],stats:true},
 {id:'helpful',label:'本次活動對我有幫助',type:'scale',required:true,options:['非常同意','同意','普通','不同意','非常不同意'],stats:true},
 {id:'again',label:'未來願意再參加類似活動',type:'radio',required:true,options:['願意','不確定','不願意'],stats:true},
 {id:'comment',label:'活動心得與建議（至少30字）',type:'paragraph',required:true,minChars:30,stats:false}
];
function seed(){ if(!localStorage.getItem(LS)){ const id='act_'+Date.now(); save({activities:[{id,title:'「我在想什麼」OH卡自我探索工作坊',date:'115年4月22日（三）',time:'12:10-16:40',place:'賈桃樂明新分館',desc:'OH卡是一種潛意識投射的心靈圖卡，透過OH卡圖像投射、自由聯想與引導式提問，可以幫助你對自己有更多的認識，以及增加內在覺察能力～\n\n★ 中午備有餐點，歡迎大家12:00過後來資源教室用餐。',regStatus:'closed',fbStatus:'closed',color:'#0b4ea2',bg:'#fff7ed',fields:defaultFields,feedbackFields:defaultFeedback,createdAt:new Date().toISOString()}],registrations:[],feedbacks:[]});}}
function db(){return JSON.parse(localStorage.getItem(LS)||'{}')} function save(x){localStorage.setItem(LS,JSON.stringify(x))} function $(id){return document.getElementById(id)} function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function statusPill(s){return s==='open'?'<span class="pill open">開放中</span>':s==='ended'?'<span class="pill end">已截止</span>':'<span class="pill closed">未開放</span>'}
function home(){location.hash='#/admin'} window.addEventListener('hashchange',render); seed(); render();
function render(){ const h=location.hash||'#/admin'; if(h.startsWith('#/register/')) return publicForm(h.split('/')[2],'reg'); if(h.startsWith('#/feedback/')) return publicForm(h.split('/')[2],'fb'); return admin(); }
function admin(tab='activities'){const data=db(); app.innerHTML=`<header><div class="wrap"><div><h1>資源教室活動報名與回饋系統 V1</h1><div class="subtitle">活動管理、報名表、回饋表、QR Code、Excel/CSV 匯出雛形</div></div><button class="btn secondary" onclick="newActivity()">新增活動</button></div></header><main class="wrap"><div class="top-note">這是第一版可操作雛形，資料目前存在瀏覽器 localStorage，之後正式版會改接 Firebase。</div><div class="tabs"><button class="tab active">活動管理</button><button class="tab" onclick="showAllData()">資料總覽</button></div><div id="main"></div></main>`; renderActivities(data);}
function renderActivities(data){$('main').innerHTML=data.activities.map(a=>`<div class="activity"><div><div class="activity-title">${esc(a.title)}</div><div class="muted">${esc(a.date)} ${esc(a.time)}｜${esc(a.place)}</div><div style="margin-top:8px">報名：${statusPill(a.regStatus)}　回饋：${statusPill(a.fbStatus)}</div><div class="btns"><button class="btn small" onclick="editActivity('${a.id}')">編輯活動/題目</button><button class="btn small secondary" onclick="viewRows('${a.id}','reg')">報名名單</button><button class="btn small secondary" onclick="viewRows('${a.id}','fb')">回饋資料/統計</button><button class="btn small gray" onclick="copyLink('${a.id}','register')">複製報名連結</button><button class="btn small gray" onclick="showQR('${a.id}','register')">報名QR</button><button class="btn small gray" onclick="copyLink('${a.id}','feedback')">複製回饋連結</button><button class="btn small gray" onclick="showQR('${a.id}','feedback')">回饋QR</button><button class="btn small danger" onclick="delActivity('${a.id}')">刪除</button></div></div><div class="muted">報名 ${data.registrations.filter(r=>r.activityId===a.id).length} 筆<br>回饋 ${data.feedbacks.filter(r=>r.activityId===a.id).length} 筆</div></div>`).join('')||'<div class="card">尚無活動</div>'}
function newActivity(){const data=db();const id='act_'+Date.now();data.activities.unshift({id,title:'新活動',date:'',time:'',place:'',desc:'',regStatus:'closed',fbStatus:'closed',color:'#0b4ea2',bg:'#fff7ed',fields:JSON.parse(JSON.stringify(defaultFields)),feedbackFields:JSON.parse(JSON.stringify(defaultFeedback)),createdAt:new Date().toISOString()});save(data);editActivity(id)}
function getAct(id){return db().activities.find(a=>a.id===id)}
function editActivity(id){const a=getAct(id);app.innerHTML=`<header><div class="wrap"><div><h1>編輯活動</h1><div class="subtitle">${esc(a.title)}</div></div><button class="btn secondary" onclick="home()">回活動列表</button></div></header><main class="wrap"><div class="grid"><section class="card"><h2>活動基本資料</h2>${row('活動名稱','title',a.title)}${row('活動日期','date',a.date)}${row('活動時間','time',a.time)}${row('活動地點','place',a.place)}<div class="row"><label>活動說明</label><textarea id="desc">${esc(a.desc)}</textarea></div><div class="row"><label>報名表狀態</label><select id="regStatus"><option value="closed">未開放</option><option value="open">開放中</option><option value="ended">已截止</option></select></div><div class="row"><label>回饋表狀態</label><select id="fbStatus"><option value="closed">未開放</option><option value="open">開放中</option><option value="ended">已截止</option></select></div><h3>外觀</h3><div class="row"><label>主題色</label><input type="color" id="color" value="${a.color||'#0b4ea2'}"></div><div class="row"><label>背景色</label><input type="color" id="bg" value="${a.bg||'#fff7ed'}"></div><div class="btns"><button class="btn" onclick="saveActivity('${id}')">儲存活動</button></div></section><section class="card"><h2>連結與 QR Code</h2><p class="help">未開放與已截止時，學生點進去會看到提示，不能填寫也不能送出。</p><div class="btns"><button class="btn secondary" onclick="copyLink('${id}','register')">複製報名連結</button><button class="btn gray" onclick="showQR('${id}','register')">產生報名 QR</button><button class="btn secondary" onclick="copyLink('${id}','feedback')">複製回饋連結</button><button class="btn gray" onclick="showQR('${id}','feedback')">產生回饋 QR</button></div></section></div><section class="card" style="margin-top:16px"><h2>報名表題目</h2><div id="regFields"></div><button class="btn secondary" onclick="addField('${id}','reg')">新增報名題目</button></section><section class="card" style="margin-top:16px"><h2>回饋表題目</h2><div id="fbFields"></div><button class="btn secondary" onclick="addField('${id}','fb')">新增回饋題目</button></section></main>`;$('regStatus').value=a.regStatus;$('fbStatus').value=a.fbStatus;renderFieldEditor(id,'reg');renderFieldEditor(id,'fb')}
function row(label,id,val){return `<div class="row"><label>${label}</label><input id="${id}" value="${esc(val)}"></div>`}
function saveActivity(id){const data=db();const a=data.activities.find(x=>x.id===id);['title','date','time','place','desc','regStatus','fbStatus','color','bg'].forEach(k=>a[k]=$(k).value);save(data);alert('已儲存');editActivity(id)}
function renderFieldEditor(id,kind){const a=getAct(id), arr=kind==='reg'?a.fields:a.feedbackFields, target=$(kind==='reg'?'regFields':'fbFields');target.innerHTML=arr.map((f,i)=>`<div class="question"><b>${i+1}. ${esc(f.label)}</b> ${f.required?'<span class="required">*</span>':''}<div class="help">題型：${f.type} ${f.minChars?`｜最低字數：${f.minChars}`:''} ${f.maxChars?`｜最高字數：${f.maxChars}`:''}</div><div class="btns"><button class="btn small gray" onclick="editField('${id}','${kind}',${i})">編輯</button>${f.fixed?'<span class="help">固定欄位</span>':`<button class="btn small danger" onclick="removeField('${id}','${kind}',${i})">刪除</button>`}</div></div>`).join('')}
function addField(id,kind){editField(id,kind,-1)}
function editField(id,kind,index){const data=db();const a=data.activities.find(x=>x.id===id);const arr=kind==='reg'?a.fields:a.feedbackFields;const f=index>=0?arr[index]:{id:'q_'+Date.now(),label:'新題目',type:'short',required:false,options:[],stats:false};const label=prompt('題目名稱',f.label);if(!label)return;const type=prompt('題型：short短答 / paragraph段落 / radio單選 / checkbox複選 / select下拉 / date日期 / scale量表',f.type)||f.type;let options=f.options||[];if(['radio','checkbox','select','scale'].includes(type)){const opt=prompt('選項，請用逗號分隔',options.join(','));options=opt?opt.split(',').map(s=>s.trim()).filter(Boolean):options}const required=confirm('是否必填？按確定=必填，取消=非必填');let minChars='',maxChars='';if(['short','paragraph'].includes(type)&&confirm('是否啟用字數限制？')){minChars=prompt('最低字數，可留空',f.minChars||'')||'';maxChars=prompt('最高字數，可留空',f.maxChars||'')||''}const stats=['radio','checkbox','select','scale'].includes(type)?confirm('是否納入百分比統計？'):false;const nf={...f,label,type,required,options,stats,minChars:minChars?Number(minChars):undefined,maxChars:maxChars?Number(maxChars):undefined};if(index>=0)arr[index]=nf;else arr.push(nf);save(data);editActivity(id)}
function removeField(id,kind,index){const data=db();const a=data.activities.find(x=>x.id===id);const arr=kind==='reg'?a.fields:a.feedbackFields;if(confirm('確定刪除此題？')){arr.splice(index,1);save(data);editActivity(id)}}
function delActivity(id){if(!confirm('確定刪除活動？資料也會保留在原始資料庫雛形中，但活動會消失。'))return;const data=db();data.activities=data.activities.filter(a=>a.id!==id);save(data);home()}
function linkFor(id,type){return location.origin+location.pathname+'#/'+(type==='register'?'register':'feedback')+'/'+id}
async function copyLink(id,type){const link=linkFor(id,type);try{await navigator.clipboard.writeText(link);alert('已複製連結：\n'+link)}catch(e){prompt('請手動複製連結',link)}}
function showQR(id,type){const link=linkFor(id,type);$('qrTitle').textContent=type==='register'?'報名表 QR Code':'回饋表 QR Code';$('qrLink').textContent=link;const src='https://api.qrserver.com/v1/create-qr-code/?size=500x500&data='+encodeURIComponent(link);$('qrImg').src=src;$('qrDownload').href=src;$('qrModal').classList.add('show')}function closeQR(){$('qrModal').classList.remove('show')}
function publicForm(id,kind){const a=getAct(id);if(!a){app.innerHTML='<div class="public-page"><div class="notice"><h2>找不到活動</h2></div></div>';return}const status=kind==='reg'?a.regStatus:a.fbStatus;const title=kind==='reg'?`${a.title} 報名表`:`${a.title} 回饋表`;document.body.style.setProperty('--primary',a.color||'#1f5fbf');document.body.style.setProperty('--bg',a.bg||'#f5f7fb');if(status!=='open'){const msg=status==='ended'?'本表單已截止填寫':'目前尚未開放填寫';app.innerHTML=`<div class="public-page" style="background:${a.bg}"><div class="form-shell"><div class="notice"><h2>${msg}</h2><p>如有特殊狀況，請洽資源教室老師。</p></div></div></div>`;return}const fields=kind==='reg'?a.fields:a.feedbackFields;app.innerHTML=`<div class="public-page" style="background:${a.bg}"><div class="form-shell"><div class="hero"><h1>${esc(title)}</h1><p>${esc(a.date)} ${esc(a.time)}｜${esc(a.place)}</p></div><div class="card"><p style="white-space:pre-line">${esc(a.desc)}</p></div><form id="pubForm">${fields.map(renderInput).join('')}<button class="btn" style="width:100%;margin-top:12px">送出</button></form></div></div>`;$('pubForm').onsubmit=(e)=>submitPublic(e,id,kind,fields)}
function renderInput(f){const req=f.required?'<span class="required"> *</span>':'';let input='';if(f.type==='paragraph') input=`<textarea name="${f.id}" ${f.required?'required':''}></textarea>`; else if(f.type==='radio'||f.type==='scale') input=`<div class="options">${(f.options||[]).map(o=>`<label><input type="radio" name="${f.id}" value="${esc(o)}" ${f.required?'required':''}> ${esc(o)}</label>`).join('')}</div>`; else if(f.type==='checkbox') input=`<div class="options">${(f.options||[]).map(o=>`<label><input type="checkbox" name="${f.id}" value="${esc(o)}"> ${esc(o)}</label>`).join('')}</div>`; else if(f.type==='select') input=`<select name="${f.id}" ${f.required?'required':''}><option value="">請選擇</option>${(f.options||[]).map(o=>`<option>${esc(o)}</option>`).join('')}</select>`; else if(f.type==='date') input=`<input type="date" name="${f.id}" ${f.required?'required':''}>`; else input=`<input name="${f.id}" ${f.required?'required':''}>`;const limit=f.minChars||f.maxChars?`<div class="help">${f.minChars?`至少 ${f.minChars} 字`:''} ${f.maxChars?`最多 ${f.maxChars} 字`:''}</div>`:'';return `<div class="field"><label>${esc(f.label)}${req}</label>${input}${limit}</div>`}
function submitPublic(e,id,kind,fields){e.preventDefault();const form=e.target;let ans={};for(const f of fields){let val;if(f.type==='checkbox') val=[...form.querySelectorAll(`[name="${f.id}"]:checked`)].map(x=>x.value); else val=(new FormData(form)).get(f.id)||''; if(f.required && (!val || (Array.isArray(val)&&!val.length))){alert('請填寫：'+f.label);return} if((f.minChars||f.maxChars)&&typeof val==='string'){const n=val.replace(/\s/g,'').length;if(f.minChars&&n<f.minChars){alert(`${f.label}\n目前 ${n} 字，至少需要 ${f.minChars} 字。`);return} if(f.maxChars&&n>f.maxChars){alert(`${f.label}\n目前 ${n} 字，最多 ${f.maxChars} 字。`);return}} ans[f.id]=val}const data=db();const rec={id:'row_'+Date.now(),activityId:id,answers:ans,createdAt:new Date().toLocaleString('zh-TW')};if(kind==='reg')data.registrations.push(rec);else data.feedbacks.push(rec);save(data);app.innerHTML='<div class="public-page"><div class="form-shell"><div class="notice success"><h2>送出成功</h2><p>感謝填寫！</p></div></div></div>'}
function viewRows(id,kind){const data=db(),a=getAct(id), fields=kind==='reg'?a.fields:a.feedbackFields, rows=(kind==='reg'?data.registrations:data.feedbacks).filter(r=>r.activityId===id);app.innerHTML=`<header><div class="wrap"><div><h1>${kind==='reg'?'報名名單':'回饋資料與統計'}</h1><div class="subtitle">${esc(a.title)}</div></div><button class="btn secondary" onclick="home()">回活動列表</button></div></header><main class="wrap"><div class="btns"><button class="btn" onclick="exportCSV('${id}','${kind}')">匯出 CSV</button>${kind==='fb'?`<button class="btn secondary" onclick="exportStats('${id}')">匯出統計 CSV</button>`:''}</div>${kind==='fb'?statsHTML(a,rows):''}<div class="card" style="overflow:auto"><table><thead><tr><th>填寫時間</th>${fields.map(f=>`<th>${esc(f.label)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.createdAt)}</td>${fields.map(f=>`<td>${esc(Array.isArray(r.answers[f.id])?r.answers[f.id].join('、'):r.answers[f.id]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div></main>`}
function statsHTML(a,rows){const fields=a.feedbackFields.filter(f=>f.stats);return `<div class="card"><h2>百分比統計</h2><div class="stat"><div><div class="muted">報名人數</div><b>${db().registrations.filter(r=>r.activityId===a.id).length}</b></div><div><div class="muted">回饋人數</div><b>${rows.length}</b></div><div><div class="muted">回饋率</div><b>${pct(rows.length,db().registrations.filter(r=>r.activityId===a.id).length)}</b></div></div>${fields.map(f=>`<h3>${esc(f.label)}</h3><table><tr><th>選項</th><th>人數</th><th>百分比</th></tr>${(f.options||[]).map(o=>{const n=rows.filter(r=>Array.isArray(r.answers[f.id])?r.answers[f.id].includes(o):r.answers[f.id]===o).length;return `<tr><td>${esc(o)}</td><td>${n}</td><td>${pct(n,rows.length)}</td></tr>`}).join('')}</table>`).join('')}</div>`}
function pct(n,d){return d?Math.round(n/d*1000)/10+'%':'0%'}
function exportCSV(id,kind){const data=db(),a=getAct(id),fields=kind==='reg'?a.fields:a.feedbackFields,rows=(kind==='reg'?data.registrations:data.feedbacks).filter(r=>r.activityId===id);const csv=[['填寫時間',...fields.map(f=>f.label)],...rows.map(r=>[r.createdAt,...fields.map(f=>Array.isArray(r.answers[f.id])?r.answers[f.id].join('、'):(r.answers[f.id]||''))])];downloadCSV(csv,`${a.title}_${kind==='reg'?'報名名單':'回饋資料'}.csv`)}
function exportStats(id){const a=getAct(id),data=db(),rows=data.feedbacks.filter(r=>r.activityId===id);let csv=[['活動名稱',a.title],['報名人數',data.registrations.filter(r=>r.activityId===id).length],['回饋人數',rows.length],['回饋率',pct(rows.length,data.registrations.filter(r=>r.activityId===id).length)],[],['題目','選項','人數','百分比']];a.feedbackFields.filter(f=>f.stats).forEach(f=>(f.options||[]).forEach(o=>{const n=rows.filter(r=>Array.isArray(r.answers[f.id])?r.answers[f.id].includes(o):r.answers[f.id]===o).length;csv.push([f.label,o,n,pct(n,rows.length)])}));downloadCSV(csv,`${a.title}_回饋統計.csv`)}
function downloadCSV(rows,name){const bom='\ufeff';const text=bom+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'}));a.download=name;a.click()}
function showAllData(){alert('目前可先從每個活動進入「報名名單」與「回饋資料/統計」查看與匯出。')}
</script>
