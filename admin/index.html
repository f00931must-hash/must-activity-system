<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAS Admin</title><link rel="stylesheet" href="../shared/css/theme.css"><link rel="stylesheet" href="./css/admin.css"></head><body><div id="loginView" class="login-view"><div class="login-card"><div class="logo">M</div><h1>MUST Activity System</h1><p>請使用授權 Google 帳號登入後台。</p><button id="loginBtn" class="primary-btn wide">使用 Google 登入</button><a href="../frontend/" class="text-link">回前台</a></div></div><div id="appView" class="admin-shell hidden"><aside class="sidebar"><a class="brand" href="../frontend/"><div class="logo small-logo">M</div><div><strong>活動系統</strong><span>管理平台</span></div></a><nav><button class="nav-item active" data-view="dashboard">🏠 儀表板</button><button class="nav-item" data-view="activities">🎉 活動管理</button><button class="nav-item" data-view="settings">⚙ 系統設定</button></nav><div class="version-bottom">v1.1.2.2.5.3</div></aside><main class="dashboard"><header class="dash-header"><div><div class="eyebrow">MUST Activity System</div><h1 id="pageTitle">儀表板</h1></div><div class="user-box"><span id="userInfo"></span><button id="logoutBtn" class="ghost-btn">登出</button></div></header><section id="view-dashboard" class="view"><section class="stats"><div class="stat-card"><span>活動數</span><strong id="statActivities">0</strong></div><div class="stat-card"><span>報名人次</span><strong id="statRegs">0</strong></div><div class="stat-card"><span>回饋份數</span><strong id="statFeedbacks">0</strong></div></section><section class="panel"><div class="panel-head"><h2>活動列表</h2><button class="primary-btn" id="newActivityBtn">＋新增活動</button></div><div id="activityList" class="admin-list">載入中...</div></section></section><section id="view-activities" class="view hidden"><section class="editor-layout"><form id="activityForm" class="panel editor-panel"><div class="panel-head"><h2 id="formTitle">新增活動</h2><button type="button" id="resetBtn" class="ghost-btn">清空</button></div><input type="hidden" id="editId"><label>活動名稱</label><input id="title" class="field" required><div class="two-col"><div><label>日期</label><input id="date" type="date" class="field" required></div><div><label>時間</label><input id="time" class="field" placeholder="12:10-16:40"></div></div><label>地點</label><input id="location" class="field"><label>活動說明</label><textarea id="description" class="field"></textarea><div class="two-col"><div><label>名額（0=不限制）</label><input id="capacity" type="number" min="0" class="field" value="0"></div><div><label>狀態</label><select id="status" class="field"><option value="open">報名中</option><option value="feedback">回饋中</option><option value="closed">已結束</option><option value="draft">草稿</option></select></div></div><label class="check-row"><input id="published" type="checkbox" checked> 顯示在學生端</label><h3>報名自訂欄位</h3><div id="registerFieldsBox" class="field-list"></div><button type="button" class="ghost-btn" id="addRegisterFieldBtn">＋新增報名題目</button><h3>回饋滿意度題目</h3><div id="feedbackQuestionsBox" class="field-list"></div><button type="button" class="ghost-btn" id="addFeedbackQuestionBtn">＋新增滿意度題目</button><label>心得最低字數</label><input id="feedbackMinWords" type="number" class="field" value="30"><button class="primary-btn wide" type="submit">儲存活動</button></form><section class="panel"><div class="panel-head"><h2>活動列表</h2><input id="adminSearch" class="field mini-search" placeholder="搜尋活動..."></div><div id="activityList2" class="admin-list">載入中...</div></section></section></section><section id="view-settings" class="view hidden"><section class="panel"><h2>⚙ 系統設定</h2><h3>管理員老師名單</h3><p>新增可登入後台的老師 Email。</p><div class="admin-email-row"><input id="adminEmailInput" class="field" placeholder="teacher@must.edu.tw"><button id="addAdminBtn" type="button" class="primary-btn">新增老師</button></div><div id="adminEmailList" class="admin-email-list">載入中...</div></section></section></main></div><div id="modal" class="modal hidden">
  <div class="modal-card">
    <button id="closeModalBtn" class="modal-close" type="button">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module" src="./js/admin.js"></script></body></html>
